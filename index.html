<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex, nofollow"><title>サンプルボード - 対応状況</title><style>:root{--page-plane:#0d0d0d;--surface-1:#1a1a19;--border:rgba(255,255,255,0.12);--text-primary:#ffffff;--text-secondary:#c3c2b7;--text-muted:#918f89;--success:#3ecf6c;--card-bg:#17171a;--column-bg:#000000;--accent:#3987e5;}*{box-sizing:border-box;}html,body{margin:0;height:100%;background:var(--page-plane);color:var(--text-primary);font-family:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:var(--surface-1);border-bottom:1px solid var(--border);flex-wrap:wrap;}.topbar h1{font-size:16px;margin:0;}.topbar .updated{font-size:12px;color:var(--text-muted);white-space:nowrap;}.board{display:flex;gap:0;background:var(--column-bg);min-height:calc(100vh - 52px);}.column{flex:1 1 0;min-width:200px;border-right:1px solid var(--border);}.column:last-child{border-right:none;}.column-header{display:flex;align-items:center;gap:8px;padding:12px 14px 10px;border-bottom:1px solid var(--border);background:var(--surface-1);}.column-header .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}.column-header .label{font-size:13px;font-weight:700;}.column-header .count{font-size:11.5px;color:var(--text-muted);margin-left:auto;}.column-body{padding:10px;}.card{background:var(--card-bg);border:1px solid var(--border);border-left:4px solid var(--text-muted);border-radius:9px;padding:11px 12px;margin-bottom:9px;font-size:13px;}.card .title{font-weight:600;font-size:13.5px;margin-bottom:6px;line-height:1.4;word-break:break-word;}.tag-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}.tag-chip{font-size:10.5px;padding:2px 7px;border-radius:20px;background:rgba(57,135,229,0.18);color:var(--accent);}.meta-row{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--text-muted);flex-wrap:wrap;}.meta-row .due{padding:1px 7px;border-radius:20px;background:#232320;}.empty-column{text-align:center;padding:30px 10px;color:var(--text-muted);font-size:12px;}@media (max-width:760px){.board{flex-direction:column;}.column{border-right:none;border-bottom:1px solid var(--border);}}</style></head><body><div class="topbar"><h1>サンプルボード - 対応状況</h1><span class="updated">最終更新: 2026/7/17 6:04:50</span></div><div class="board"><div class="column"><div class="column-header"><span class="dot" style="background:var(--text-muted)"></span><span class="label">未対応</span><span class="count">1</span></div><div class="column-body"><div class="card" style="border-left-color:#e5484d"><div class="title">アバターの腕が貫通する</div><div class="tag-row"><span class="tag-chip">当たり判定</span></div><div class="meta-row">👤 自分</div></div></div></div><div class="column"><div class="column-header"><span class="dot" style="background:#2f80ed"></span><span class="label">対応中</span><span class="count">1</span></div><div class="column-body"><div class="card" style="border-left-color:#2f80ed"><div class="title">マテリアルの色が予想より暗い</div><div class="tag-row"><span class="tag-chip">マテリアル</span></div><div class="meta-row">👤 自分</div></div></div></div><div class="column"><div class="column-header"><span class="dot" style="background:#f2994a"></span><span class="label">検証中</span><span class="count">0</span></div><div class="column-body"><div class="empty-column">チケットなし</div></div></div><div class="column"><div class="column-header"><span class="dot" style="background:var(--success)"></span><span class="label">完了</span><span class="count">1</span></div><div class="column-body"><div class="card" style="border-left-color:#f2994a"><div class="title">キャラクターの顔がつぶれたままになっています。 バグ修正お願いします</div><div class="tag-row"><span class="tag-chip">グラフィック</span></div></div></div></div><div class="column"><div class="column-header"><span class="dot" style="background:#7c5cff"></span><span class="label">対応困難</span><span class="count">0</span></div><div class="column-body"><div class="empty-column">チケットなし</div></div></div></div></body></html>
